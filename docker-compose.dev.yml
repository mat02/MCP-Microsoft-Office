services:
  mcp-office-dev:
    image: node:20-bookworm-slim
    working_dir: /app
    environment:
      NODE_ENV: test
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: debug
      MCP_SILENT_MODE: "false"
    volumes:
      - .:/app
      - ./.docker-node_modules:/app/node_modules
    command: node --version
